rhel9cis_rule_7_1_4: true # Ensure permissions on /etc/group- are configured
rhel9cis_rule_7_1_5: true # Ensure permissions on /etc/shadow are configured
rhel9cis_rule_7_1_6: true # Ensure permissions on /etc/shadow- are configured
rhel9cis_rule_7_1_7: true # Ensure permissions on /etc/gshadow are configured
rhel9cis_rule_7_1_8: true # Ensure permissions on /etc/gshadow- are configured
rhel9cis_rule_7_1_9: true # Ensure permissions on /etc/shells are configured
rhel9cis_rule_7_1_10: true # Ensure permissions on /etc/security/opasswd are configured
rhel9cis_rule_7_1_11: true # Ensure world writable files and directories are secured
rhel9cis_rule_7_1_12: true # Ensure no files or directories without an owner and a group exist
rhel9cis_rule_7_1_13: true # Ensure SUID and SGID files are reviewed
