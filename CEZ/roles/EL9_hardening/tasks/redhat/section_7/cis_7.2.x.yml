---
- name: "Ensure accounts in /etc/passwd use shadowed passwords"
  when:
    - rhel9cis_rule_7_2_1
  vars:
    warn_control_id: '7.2.1'
  block:
    - name: "Ensure accounts in /etc/passwd use shadowed passwords | Get users not using shadowed passwords"
      ansible.builtin.shell: awk -F':' '($2 != "x" ) { print $1}' /etc/passwd
      changed_when: false
      failed_when: false
      register: discovered_nonshadowed_users

    - name: "Ensure accounts in /etc/passwd use shadowed passwords | Warn on findings"
      when: discovered_nonshadowed_users.stdout | length > 0
      ansible.builtin.debug:
        msg:
              - "Warning!! You have users that are not using a shadowed password. Please convert the below accounts to use a shadowed password"
              - "{{ discovered_nonshadowed_users.stdout_lines }}"

    - name: "Create an entry in the log file for tasks requiring manual intervention."
      when: discovered_nonshadowed_users.stdout | length > 0
      ansible.builtin.blockinfile:
        path: "{{ manual_intervention_log }}"
        create: yes
        mode: '0644'
        marker: ""
        block: |
          Recommendations for task "{{ warn_control_id }}":
          -------------------------------------------------------------------------------------------------------------- 
          You have users that are not using a shadowed password
          The accounts are listed below, please convert them to use a shadowed password
          "{{ discovered_nonshadowed_users.stdout_lines }}"

- name: "Ensure /etc/shadow password fields are not empty"
  when:
    - rhel9cis_rule_7_2_2
  block:
    - name: "Ensure /etc/shadow password fields are not empty | Find users with no password"
      ansible.builtin.shell: awk -F":" '($2 == "" ) { print $1 }' /etc/shadow
      changed_when: false
      check_mode: false
      register: discovered_empty_password_acct

    - name: "Ensure /etc/shadow password fields are not empty | Lock users with empty password"
      when: discovered_empty_password_acct.stdout | length > 0
      ansible.builtin.user:
        name: "{{ item }}"
        password_lock: true
      loop:
        - "{{ discovered_empty_password_acct.stdout_lines }}"

- name: "Ensure all groups in /etc/passwd exist in /etc/group"
  when:
    - rhel9cis_rule_7_2_3
  vars:
    warn_control_id: '7.2.3'
  block:
    - name: "Ensure all groups in /etc/passwd exist in /etc/group | Check /etc/passwd entries"
      ansible.builtin.shell: pwck -r | grep 'no group' | awk '{ gsub("[:\47]",""); print $2}'
      changed_when: false
      failed_when: false
      check_mode: false
      register: discovered_passwd_gid_check

    - name: "Ensure all groups in /etc/passwd exist in /etc/group | Print warning about users with invalid GIDs missing GID entries in /etc/group"
      when: discovered_passwd_gid_check.stdout | length > 0
      ansible.builtin.debug:
        msg: "Warning!! The following users have non-existent GIDs (Groups): {{ discovered_passwd_gid_check.stdout_lines | join(', ') }}"

    - name: "Create an entry in the log file for tasks requiring manual intervention."
      when: discovered_passwd_gid_check.stdout | length > 0
      ansible.builtin.blockinfile:
        path: "{{ manual_intervention_log }}"
        create: yes
        mode: '0644'
        marker: ""
        block: |
          Recommendations for task "{{ warn_control_id }}":
          -------------------------------------------------------------------------------------------------------------- 
          You have users with non-existent GIDs (Groups): {{ discovered_passwd_gid_check.stdout_lines | join(', ') }}
          Please either remove these users or assign them to an existing group.

- name: "Ensure no duplicate UIDs exist"
  when:
    - rhel9cis_rule_7_2_4
  vars:
    warn_control_id: '7.2.4'
  block:
    - name: "Ensure no duplicate UIDs exist | Check for duplicate UIDs"
      ansible.builtin.shell: "pwck -r | awk -F: '{if ($3 in uid) print $1 ; else uid[$3]}' /etc/passwd"
      changed_when: false
      failed_when: false
      check_mode: false
      register: discovered_user_uid_check

    - name: "Ensure no duplicate UIDs exist | Print warning about users with duplicate UIDs"
      when: discovered_user_uid_check.stdout | length > 0
      ansible.builtin.debug:
        msg: "Warning!! The following users have UIDs that are duplicates: {{ discovered_user_uid_check.stdout_lines }}"

    - name: "Create an entry in the log file for tasks requiring manual intervention."
      when: discovered_user_uid_check.stdout | length > 0
      ansible.builtin.blockinfile:
        path: "{{ manual_intervention_log }}"
        create: yes
        mode: '0644'
        marker: ""
        block: |
          Recommendations for task "{{ warn_control_id }}":
          -------------------------------------------------------------------------------------------------------------- 
          You have users with duplicate UIDs: {{ discovered_user_uid_check.stdout_lines | join(', ') }}
          Please either remove these users or assign them unique UIDs.
    

