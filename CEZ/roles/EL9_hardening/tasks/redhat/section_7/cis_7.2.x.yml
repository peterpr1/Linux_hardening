    - name: "Ensure no duplicate user names exist | Print warning about users with duplicate User Names"
      when: discovered_username_check.stdout | length > 0
      ansible.builtin.debug:
        msg: "Warning!! The following user names are duplicates: {{ discovered_user_username_check.stdout_lines }}"

    - name: "Create an entry in the log file for tasks requiring manual intervention."
      when: discovered_username_check.stdout | length > 0
