- name: "Ensure no duplicate group names exist"
  when:
    - rhel9cis_rule_7_2_7
  vars:
    warn_control_id: '7.2.7'
  block:
    - name: "Ensure no duplicate group names exist | Check for duplicate group names"
      ansible.builtin.shell: 'getent passwd | cut -d: -f1 | sort -n | uniq -d'
      changed_when: false
      failed_when: false
      check_mode: false
      register: discovered_group_check

    - name: "Ensure no duplicate group names exist | Print warning about users with duplicate group names"
      when: discovered_group_check.stdout | length > 0
      ansible.builtin.debug:
        msg: "Warning!! The following group names are duplicates: {{ discovered_group_check.stdout_lines }}"

    - name: "Create an entry in the log file for tasks requiring manual intervention."
      when: discovered_group_check.stdout | length > 0
      ansible.builtin.blockinfile:
        path: "{{ manual_intervention_log }}"
        create: yes
        mode: '0644'
        marker: ""
        block: |
          Recommendations for task "{{ warn_control_id }}":
          -------------------------------------------------------------------------------------------------------------- 
          You have group names that are duplicates: {{ discovered_group_check.stdout_lines | join(', ') }}
          Please either remove these groups or assign them unique names.

- name: "Ensure local interactive user home directories are configured"
  when:
    - rhel9cis_rule_7_2_8
  block:
    - name: "Ensure local interactive user home directories are configured | Create dir if absent" 
      ansible.builtin.file:
        path: "{{ item.dir }}"
        state: directory
        owner: "{{ item.id }}"
        group: "{{ item.gid }}"
      loop: "{{ prelim_captured_passwd_data | selectattr('uid', '>=', prelim_min_int_uid | int) | selectattr('uid', '<=', prelim_max_int_uid | int) | list }}"
      loop_control:
        label: "{{ item.id }}"

    - name: "Ensure local interactive user home directories are configured | Set group ACL"
      when: not system_is_container
      ansible.posix.acl:
        path: "{{ item }}"
        default: true
        etype: group
        permissions: rx
        state: present
      loop: "{{ prelim_interactive_users | map(attribute='home') | list }}"

    - name: "Ensure local interactive user home directories are configured | Set other ACL"
      when: not system_is_container
      ansible.posix.acl:
        path: "{{ item }}"
        default: true
        etype: other
        permissions: 0
        state: present
      loop: "{{ prelim_interactive_users | map(attribute='home') | list }}"

- name: "Ensure local interactive user dot files access is configured"
  when:
    - rhel9cis_rule_7_2_9
  vars:
    warn_control_id: '7.2.9'
  block:
    - name: "Ensure local interactive user dot files access is configured"
      ansible.builtin.shell: find {{ prelim_interactive_users_home.stdout_lines | list | join(' ') }} -name "\.*" -type f
      changed_when: false
      failed_when: discovered_homedir_hidden_files.rc not in [ 0, 1 ]
      check_mode: false
      register: discovered_homedir_hidden_files

    - name: "Ensure local interactive user dot files access is configured | Warning on files found"
      when:
        - discovered_homedir_hidden_files.stdout | length > 0
        - not rhel9cis_dotperm_ansiblemanaged
      ansible.builtin.debug:
        msg:
          - "Warning!! Please investigate that hidden files found in users home directories match control requirements."

    - name: "Create an entry in the log file for tasks requiring manual intervention."
      when:
        - discovered_homedir_hidden_files.stdout | length > 0
        - not rhel9cis_dotperm_ansiblemanaged
      ansible.builtin.blockinfile:
        path: "{{ manual_intervention_log }}"
        create: yes
        mode: '0644'
        marker: ""
        block: |
          Recommendations for task "{{ warn_control_id }}":
          -------------------------------------------------------------------------------------------------------------- 
          Please investigate that hidden files found in users home directories match control requirements. 
          The following hidden files were discovered: {{ discovered_homedir_hidden_files.stdout_lines | join(', ') }}

    - name: "Ensure local interactive user dot files access is configured"
      when:
        - discovered_homedir_hidden_files.stdout | length > 0
        - rhel9cis_dotperm_ansiblemanaged
      block:
        - name: "Ensure local interactive user dot files access is configured | Changes files if configured .bash_history & .netrc"
          when:
            - discovered_homedir_hidden_files.stdout | length > 0
            - item | basename in ['.bash_history','.netrc']
          ansible.builtin.file:
            path: "{{ item }}"
            mode: 'u-x,go-rwx'
          failed_when: discovered_dot_bash_history_to_change.state not in '[ file, absent ]'
          register: discovered_dot_bash_history_to_change
          loop: "{{ discovered_homedir_hidden_files.stdout_lines }}"

        - name: "Ensure local interactive user dot files access is configured | Changes files if configured file mode"
          ansible.builtin.file:
            path: '{{ item }}'
            mode: 'u-x,go-wx'
          failed_when: discovered_dot_bash_history_to_change.state not in '[ file, absent ]'
          register: discovered_dot_bash_history_to_change
          loop: "{{ discovered_homedir_hidden_files.stdout_lines }}"

        - name: "Ensure local interactive user dot files access is configured | Changes files ownerships"
          ansible.builtin.file:
            path: "{{ item }}"
            owner: "{{ prelim_captured_passwd_data | selectattr('dir', 'in', prelim_interactive_users_home.stdout_lines) | selectattr('dir', 'in', item) | map(attribute='uid') | last }}"
            group: "{{ prelim_captured_passwd_data | selectattr('dir', 'in', prelim_interactive_users_home.stdout_lines) | selectattr('dir', 'in', item) | map(attribute='gid') | last }}"
          failed_when: discovered_dot_bash_history_to_change.state not in '[ file, absent ]'
          register: discovered_dot_bash_history_to_change
          loop: "{{ discovered_homedir_hidden_files.stdout_lines }}"

        - name: "Ensure local interactive user dot files access is configured | Changes files if configured"
          ansible.builtin.file:
            path: '{{ item }}'
            mode: 'go-w'
            owner: "{{ prelim_captured_passwd_data | selectattr('dir', 'in', prelim_interactive_users_home.stdout_lines) | selectattr('dir', 'in', item) | map(attribute='uid') | last }}"
            group: "{{ prelim_captured_passwd_data | selectattr('dir', 'in', prelim_interactive_users_home.stdout_lines) | selectattr('dir', 'in', item) | map(attribute='gid') | last }}"
          with_items: "{{ discovered_homedir_hidden_files.stdout_lines }}"

        - name: "Ensure local interactive user dot files access is configured | rename .forward or .rhosts files"
          when:
            - item | basename in ['.forward','.rhosts']
            - item is not search ("CIS")
          ansible.builtin.command: "mv {{ item }} {{ item }}_CIS_TOBEREVIEWED"
          changed_when: true
          loop: "{{ discovered_homedir_hidden_files.stdout_lines }}"
